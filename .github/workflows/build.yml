name: build.yml
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Это принудительно включает Node.js 24 для всех экшенов и убирает варнинги
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout logic
        uses: actions/checkout@v4

      - name: Set variables
        run: |
          # Устанавливаем временную зону для текущего шага
          export TZ="Europe/Moscow"
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "WIN_UPDATE=https://raw.githubusercontent.com/crazy-max/WindowsSpyBlocker/master/data/hosts/update.txt" >> $GITHUB_ENV
          echo "WIN_EXTRA=https://raw.githubusercontent.com/crazy-max/WindowsSpyBlocker/master/data/hosts/extra.txt" >> $GITHUB_ENV
        shell: bash

      - name: Clone community list
        run: git clone --depth 1 https://github.com/v2fly/domain-list-community community

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: './community/go.mod'
          cache-dependency-path: './community/go.sum'

      - name: Download and Prepare Data
        run: |
          # 1. Скачивание списков Windows
          curl -sSLf $WIN_UPDATE | grep "0.0.0.0" | awk '{print $2}' > ./community/data/win-update
          curl -sSLf $WIN_EXTRA | grep "0.0.0.0" | awk '{print $2}' > ./community/data/win-extra

          TARGET_DIR="./community/data"
          
          # 2. Очистка по шаблонам (как в вашем скрипте)
          while read -r pattern; do
              echo "Обработка шаблона: $pattern"
              (cd "$TARGET_DIR" && rm -f $pattern)
              find "$TARGET_DIR" -type f -exec sed -i "/include:$pattern\([[:space:]].*\|$\)/d" {} +
          done <<EOF
          *-cn
          *-!cn
          *-porn
          *-ir
          *-jp
          *-entertainment
          *-scholar
          *-pt
          *-tm
          *-companies
          *-toshokan
          EOF

          # 3. Удаление цифровых файлов и ссылок на них
          cd "$TARGET_DIR"
          echo "Обработка шаблона: [0-9]*"
          rm -f [0-9]*
          find . -type f -exec sed -i "/include:[0-9].*\([[:space:]].*\|$\)/d" {} +

