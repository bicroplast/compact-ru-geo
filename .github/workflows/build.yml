name: build.yml
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Включаем Node.js 24 для всех экшенов
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout logic
        uses: actions/checkout@v4

      - name: Set variables
        run: |
          echo "TAG_NAME=$(TZ='Europe/Moscow' date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=Released on $(TZ='Europe/Moscow' date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "WIN_UPDATE=https://raw.githubusercontent.com/crazy-max/WindowsSpyBlocker/master/data/hosts/update.txt" >> $GITHUB_ENV
          echo "WIN_EXTRA=https://raw.githubusercontent.com/crazy-max/WindowsSpyBlocker/master/data/hosts/extra.txt" >> $GITHUB_ENV
        shell: bash

      - name: Clone community list
        run: git clone --depth 1 https://github.com/v2fly/domain-list-community community

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: './community/go.mod'
          cache-dependency-path: './community/go.sum'

      - name: Download and Prepare Data
        run: |
          # 1. Скачивание списков Windows
          curl -sSLf $WIN_UPDATE | grep "0.0.0.0" | awk '{print $2}' > ./community/data/win-update
          curl -sSLf $WIN_EXTRA | grep "0.0.0.0" | awk '{print $2}' > ./community/data/win-extra

          TARGET_DIR="./community/data"
          
          # 2. Очистка по шаблонам
          while read -r pattern; do
              echo "Обработка шаблона: $pattern"
              (cd "$TARGET_DIR" && rm -f $pattern)
              find "$TARGET_DIR" -type f -exec sed -i "/include:$pattern\([[:space:]].*\|$\)/d" {} +
          done <<EOF
*-cn
*-!cn
*-porn
*-ir
*-jp
*-entertainment
*-scholar
*-pt
*-tm
*-companies
*-toshokan
EOF

          # 3. Удаление цифровых файлов и ссылок на них
          cd "$TARGET_DIR"
          echo "Обработка шаблона: [0-9]*"
          rm -f [0-9]*
          find . -type f -exec sed -i "/include:[0-9].*\([[:space:]].*\|$\)/d" {} +

          # 4. Обработка кастомного списка geolist_del.txt
          GEOLIST_DEL="${GITHUB_WORKSPACE}/geolist_del.txt"
          if [ ! -f "$GEOLIST_DEL" ]; then
            echo "Файл geolist_del.txt не найден в репозитории!"
            exit 1
          fi

          echo "Удаление файлов и вхождений по списку geolist_del"
          while read -r pattern; do
              [ -z "$pattern" ] && continue          # пропускаем пустые строки
              [[ "$pattern" == \#* ]] && continue    # пропускаем комментарии
              rm -f "$pattern"
          done < "$GEOLIST_DEL"

          # 5. Очистка зависимостей include
          # Составляем список всех файлов, которые реально остались в папке
          ls -1 > /tmp/geosite_tags.txt
          # Проходим по всем оставшимся файлам
          for file in *; do
              [ -f "$file" ] || continue
              # Ищем в файле все строки include:имя
              # Если "имя" отсутствует в списке существующих файлов — удаляем эту строку
              grep "include:" "$file" | cut -d':' -f2 | awk '{print $1}' | sort -u | while read -r included; do
                  if ! grep -qx "$included" /tmp/geosite_tags.txt; then
                      echo "Removing broken include:$included from $file"
                      sed -i "/include:$included\([[:space:]].*\|$\)/d" "$file"
                  fi
              done
          done

      - name: Build geosite.dat
        run: |
          cd community
          go run ./
          mkdir -p ../publish
          # В репозитории v2fly результат сборки называется dlc.dat
          cp dlc.dat ../publish/geosite.dat
          cp /tmp/geosite_tags.txt ../publish/geosite_tags.txt

      - name: Generate Checksum
        run: |
          cd publish
          sha256sum geosite.dat > geosite.dat.sha256sum

      - name: Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.TAG_NAME }}" ./publish/* \
            --title "${{ env.RELEASE_NAME }}" \
            --latest

      - name: Git push assets to "release" branch
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f -u origin release
          
      - name: Delete old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            | jq -r 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | xargs -I {} gh release delete {} --yes --cleanup-tag
